<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفرز الذكي | Tri Intelligent</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --green-50: #E8F5E9; --green-100: #C8E6C9; --green-200: #A5D6A7;
            --green-400: #66BB6A; --green-500: #4CAF50; --green-600: #43A047;
            --green-700: #388E3C; --green-800: #2E7D32; --green-900: #1B5E20;
            --orange-400: #FFA726; --orange-500: #FF9800; --orange-600: #FB8C00; --orange-700: #F57C00;
            --amber-400: #FFCA28; --amber-500: #FFC107;
            --red-500: #F44336; --red-600: #E53935;
            --blue-500: #2196F3; --blue-600: #1E88E5;
            --white: #FFFFFF; --gray-50: #FAFAFA; --gray-100: #F5F5F5;
            --gray-200: #EEEEEE; --gray-300: #E0E0E0; --gray-400: #BDBDBD;
            --gray-500: #9E9E9E; --gray-600: #757575; --gray-700: #616161;
            --gray-800: #424242; --gray-900: #212121;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.12);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.2);
            --shadow-xl: 0 30px 80px rgba(0,0,0,0.25);
            --radius-xs: 8px; --radius-sm: 12px; --radius: 18px;
            --radius-lg: 26px; --radius-xl: 36px;
            --transition-fast: 0.2s cubic-bezier(0.4,0,0.2,1);
            --transition: 0.4s cubic-bezier(0.25,0.8,0.25,1.2);
            --transition-slow: 0.7s cubic-bezier(0.25,0.8,0.25,1.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            background: #0a1a0a;
            min-height: 100vh;
            color: var(--gray-900);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        /* ============ خلفية متحركة ============ */
        .bg-animated {
            position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;
            background: 
                radial-gradient(ellipse at 25% 15%, rgba(255,152,0,0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 80%, rgba(46,125,50,0.1) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(255,193,7,0.04) 0%, transparent 60%),
                linear-gradient(180deg, #0d1f0d 0%, #0a1a0a 40%, #061006 100%);
        }

        .particle {
            position:fixed; border-radius:50%; pointer-events:none; z-index:0;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(108vh) scale(0) rotate(0deg); opacity:0; }
            8% { opacity:0.7; } 85% { opacity:0.7; }
            100% { transform: translateY(-8vh) scale(1.3) rotate(360deg); opacity:0; }
        }

        /* ============ شريط التنقل ============ */
        .navbar {
            position:fixed; top:0; left:0; right:0; z-index:1000;
            background: rgba(10,26,10,0.8); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding:0 16px; height:62px;
            display:flex; align-items:center; gap:12px;
            transition: var(--transition);
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
        }

        .navbar.scrolled { background: rgba(10,26,10,0.95); box-shadow: 0 4px 35px rgba(0,0,0,0.5); }

        .btn-back {
            width:40px; height:40px; border-radius:50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            cursor:pointer; font-size:18px;
            display:flex; align-items:center; justify-content:center;
            transition: var(--transition-fast); color:white; flex-shrink:0;
        }

        .btn-back:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); transform: scale(1.08); }
        .btn-back:active { transform: scale(0.9); }

        .nav-title { font-size:17px; font-weight:800; color:white; flex:1; }

        /* نقاط المستخدم */
        .points-badge {
            background: linear-gradient(135deg, var(--amber-400), var(--orange-500));
            color: white; padding: 8px 14px; border-radius: 25px;
            font-size:13px; font-weight:800; display:flex; align-items:center; gap:6px;
            box-shadow: 0 4px 18px rgba(255,152,0,0.45);
            animation: badgeGlow 2.5s ease-in-out infinite;
            flex-shrink:0;
        }

        @keyframes badgeGlow {
            0%,100% { box-shadow: 0 4px 18px rgba(255,152,0,0.45); }
            50% { box-shadow: 0 4px 28px rgba(255,152,0,0.7); }
        }

        /* ============ المحتوى ============ */
        .main-container {
            position:relative; z-index:1; max-width:560px; margin:0 auto;
            padding: 85px 16px 40px;
        }

        /* ============ بطاقة الرصيد ============ */
        .balance-card {
            background: linear-gradient(135deg, #1B5E20, #2E7D32, #388E3C);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            color: white;
            text-align: center;
            margin-bottom: 16px;
            box-shadow: 0 12px 45px rgba(0,0,0,0.35);
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.6s ease both;
        }

        @keyframes cardAppear {
            from { opacity:0; transform: translateY(30px) scale(0.95); }
            to { opacity:1; transform: translateY(0) scale(1); }
        }

        .balance-card::before {
            content:''; position:absolute; top:-40px; right:-40px;
            width:150px; height:150px;
            background: rgba(255,255,255,0.06); border-radius:50%;
        }

        .balance-card::after {
            content:''; position:absolute; bottom:-30px; left:-30px;
            width:100px; height:100px;
            background: rgba(255,255,255,0.04); border-radius:50%;
        }

        .balance-label { font-size:13px; opacity:0.85; font-weight:500; position:relative; z-index:1; }
        .balance-amount {
            font-size:48px; font-weight:900; font-family:'Poppins','Cairo',sans-serif;
            direction:ltr; display:inline-block; margin:4px 0;
            position:relative; z-index:1;
            animation: countUp 1s ease;
        }

        .balance-sub { font-size:12px; opacity:0.7; position:relative; z-index:1; }

        /* ============ شبكة المواد ============ */
        .section-title {
            font-size:17px; font-weight:800; color:white; margin-bottom:12px;
            display:flex; align-items:center; gap:8px;
        }

        .materials-grid {
            display:grid; grid-template-columns: repeat(2, 1fr); gap:12px;
            margin-bottom: 16px;
        }

        @media (min-width:420px) { .materials-grid { grid-template-columns: repeat(3, 1fr); } }

        .material-card {
            background: rgba(255,255,255,0.93);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: var(--radius); padding:20px 12px;
            text-align:center; cursor:pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            box-shadow: var(--shadow);
            animation: cardAppear 0.55s ease both;
            position:relative; overflow:hidden;
        }

        .material-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--orange-400);
        }

        .material-card.selected {
            border-color: var(--orange-500);
            background: #FFF8E1;
            box-shadow: 0 0 0 6px rgba(255,152,0,0.12);
            animation: selectedPop 0.4s ease;
        }

        @keyframes selectedPop {
            0% { transform: scale(1); }
            40% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        .mat-emoji { font-size:40px; display:block; margin-bottom:8px; }

        .mat-name { font-size:14px; font-weight:800; color:var(--gray-800); }

        .mat-price {
            font-size:12px; color:var(--orange-600); font-weight:700; margin-top:4px;
            font-family:'Poppins','Cairo',sans-serif; direction:ltr;
        }

        /* ============ بطاقة الطلب ============ */
        .request-card {
            background: rgba(255,255,255,0.93);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: var(--radius-lg); padding:22px 18px;
            box-shadow: var(--shadow-md); margin-bottom:14px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: cardAppear 0.55s ease 0.15s both;
        }

        .req-header {
            display:flex; align-items:center; gap:10px; margin-bottom:16px;
        }

        .req-icon {
            width:44px; height:44px; border-radius:14px;
            background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
            display:flex; align-items:center; justify-content:center; font-size:22px;
        }

        .req-title { font-size:16px; font-weight:800; color:var(--gray-800); flex:1; }

        .weight-input-group {
            display:flex; align-items:center; gap:10px; margin-bottom:12px;
        }

        .weight-input {
            flex:1; padding:14px 16px;
            border: 2px solid var(--gray-200); border-radius: var(--radius-sm);
            font-size:16px; font-family:'Poppins','Cairo',sans-serif;
            font-weight:700; text-align:center; direction:ltr;
            transition: var(--transition-fast); background:var(--white);
        }

        .weight-input:focus {
            outline:none; border-color:var(--orange-400);
            box-shadow: 0 0 0 4px rgba(255,152,0,0.1);
        }

        .weight-unit {
            font-size:14px; font-weight:700; color:var(--gray-600);
            background:var(--gray-100); padding:14px 16px;
            border-radius: var(--radius-sm);
        }

        .estimated-points {
            background: var(--green-50); padding:14px 16px;
            border-radius: var(--radius-sm); text-align:center; margin-bottom:14px;
            border: 1px solid var(--green-100);
        }

        .est-label { font-size:12px; color:var(--gray-600); }
        .est-value {
            font-size:28px; font-weight:900; color:var(--green-800);
            font-family:'Poppins','Cairo',sans-serif; direction:ltr;
        }

        .request-btn {
            width:100%; padding:16px; border:none; border-radius:var(--radius-sm);
            font-size:16px; font-weight:800; cursor:pointer;
            transition:var(--transition); color:white;
            font-family:'Cairo','Poppins',sans-serif;
            background: linear-gradient(135deg, var(--orange-500), var(--orange-700));
            box-shadow: 0 8px 28px rgba(255,152,0,0.35);
            display:flex; align-items:center; justify-content:center; gap:8px;
            position:relative; overflow:hidden;
        }

        .request-btn:hover {
            box-shadow: 0 14px 38px rgba(255,152,0,0.5);
            transform: translateY(-3px);
        }

        .request-btn:active { transform: scale(0.96); }
        .request-btn:disabled { background:var(--gray-400); box-shadow:none; cursor:not-allowed; pointer-events:none; }

        /* ============ لوحة المتصدرين ============ */
        .leaderboard-card {
            background: rgba(255,255,255,0.93);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: var(--radius-lg); padding:22px 18px;
            box-shadow: var(--shadow-md); margin-bottom:14px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: cardAppear 0.55s ease 0.25s both;
        }

        .lb-header {
            display:flex; align-items:center; gap:10px; margin-bottom:16px;
        }

        .lb-icon {
            width:44px; height:44px; border-radius:14px;
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
            display:flex; align-items:center; justify-content:center; font-size:22px;
        }

        .lb-title { font-size:16px; font-weight:800; color:var(--gray-800); flex:1; }

        .lb-list { display:flex; flex-direction:column; gap:8px; }

        .lb-item {
            display:flex; align-items:center; gap:10px;
            padding:12px 14px; border-radius:var(--radius-sm);
            background:var(--gray-50); transition:var(--transition-fast);
        }

        .lb-item:hover { background:var(--green-50); transform:translateX(-4px); }

        .lb-rank {
            width:32px; height:32px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-weight:900; font-size:14px; flex-shrink:0;
            font-family:'Poppins','Cairo',sans-serif; direction:ltr;
        }

        .rank-gold { background:#FFF8E1; color:#F57F17; }
        .rank-silver { background:#ECEFF1; color:#546E7A; }
        .rank-bronze { background:#FBE9E7; color:#BF360C; }
        .rank-normal { background:var(--gray-200); color:var(--gray-600); }

        .lb-avatar { font-size:24px; flex-shrink:0; }
        .lb-name { flex:1; font-weight:700; font-size:14px; color:var(--gray-800); }
        .lb-points {
            font-weight:900; font-size:14px; color:var(--green-700);
            font-family:'Poppins','Cairo',sans-serif; direction:ltr;
        }

        /* ============ نافذة النجاح ============ */
        .overlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); z-index:2000;
            display:none; align-items:center; justify-content:center; padding:20px;
            animation: overlayIn 0.35s ease;
        }

        .overlay.visible { display:flex; }

        @keyframes overlayIn { from{opacity:0;} to{opacity:1;} }

        .modal-card {
            background:var(--white); border-radius:var(--radius-lg);
            padding:40px 24px 30px; text-align:center; max-width:400px; width:100%;
            animation: modalSpring 0.6s ease;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }

        @keyframes modalSpring {
            0% { transform: scale(0.6) translateY(50px); opacity:0; }
            60% { transform: scale(1.04) translateY(-5px); opacity:1; }
            100% { transform: scale(1) translateY(0); opacity:1; }
        }

        .modal-emoji { font-size:80px; animation: successBounce 0.7s ease; }

        @keyframes successBounce {
            0% { transform: scale(0) rotate(-40deg); }
            55% { transform: scale(1.25) rotate(8deg); }
            100% { transform: scale(1) rotate(0); }
        }

        .modal-heading { font-size:23px; font-weight:900; color:var(--green-800); margin:8px 0 6px; }
        .modal-desc { font-size:14px; color:var(--gray-600); margin-bottom:24px; line-height:1.7; }

        .modal-btn {
            padding:14px 38px; border:none; border-radius:30px;
            background:var(--green-600); color:white; font-size:15px; font-weight:700;
            cursor:pointer; font-family:'Cairo','Poppins',sans-serif;
            transition:var(--transition); box-shadow: 0 6px 22px rgba(46,125,50,0.35);
        }

        .modal-btn:hover { background:var(--green-700); transform:scale(1.06); box-shadow: 0 10px 30px rgba(46,125,50,0.5); }
    </style>
</head>
<body>

    <!-- خلفية -->
    <div class="bg-animated" id="bgAnimated"></div>

    <!-- شريط التنقل -->
    <header class="navbar" id="navbar">
        <button class="btn-back" onclick="history.back()">←</button>
        <span class="nav-title" data-ar="🗂️ الفرز الذكي" data-fr="🗂️ Tri Intelligent">🗂️ الفرز الذكي</span>
        <div class="points-badge" id="pointsBadge">
            ⭐ <span id="totalPoints">500</span>
        </div>
    </header>

    <!-- المحتوى -->
    <main class="main-container">

        <!-- بطاقة الرصيد -->
        <div class="balance-card">
            <div class="balance-label" data-ar="رصيد نقاطك" data-fr="Votre solde de points">رصيد نقاطك</div>
            <div class="balance-amount" id="balanceDisplay">500</div>
            <div class="balance-sub" data-ar="نقطة قابلة للاستبدال" data-fr="points échangeables">نقطة قابلة للاستبدال</div>
        </div>

        <!-- اختيار المادة -->
        <div class="section-title">♻️ <span data-ar="اختر نوع المادة" data-fr="Choisissez le matériau">اختر نوع المادة</span></div>
        
        <div class="materials-grid" id="materialsGrid">
            <div class="material-card" onclick="selectMaterial(this, 'carton')" data-material="carton">
                <span class="mat-emoji">📦</span>
                <span class="mat-name" data-ar="كرتون" data-fr="Carton">كرتون</span>
                <span class="mat-price" data-ar="10 نقاط/كغ" data-fr="10 pts/kg">10 نقاط/كغ</span>
            </div>
            <div class="material-card" onclick="selectMaterial(this, 'plastique')" data-material="plastique">
                <span class="mat-emoji">🫙</span>
                <span class="mat-name" data-ar="بلاستيك" data-fr="Plastique">بلاستيك</span>
                <span class="mat-price" data-ar="15 نقاط/كغ" data-fr="15 pts/kg">15 نقاط/كغ</span>
            </div>
            <div class="material-card" onclick="selectMaterial(this, 'verre')" data-material="verre">
                <span class="mat-emoji">🫗</span>
                <span class="mat-name" data-ar="زجاج" data-fr="Verre">زجاج</span>
                <span class="mat-price" data-ar="8 نقاط/كغ" data-fr="8 pts/kg">8 نقاط/كغ</span>
            </div>
        </div>

        <!-- بطاقة الطلب -->
        <div class="request-card" id="requestCard">
            <div class="req-header">
                <div class="req-icon">📋</div>
                <span class="req-title" data-ar="طلب استلام" data-fr="Demande de collecte">طلب استلام</span>
            </div>
            
            <div class="weight-input-group">
                <input type="number" class="weight-input" id="weightInput" 
                       placeholder="0" min="1" max="100" value="5"
                       oninput="updateEstimate()">
                <span class="weight-unit" data-ar="كيلوغرام" data-fr="Kilogrammes">كيلوغرام</span>
            </div>
            
            <div class="estimated-points">
                <div class="est-label" data-ar="النقاط المقدرة" data-fr="Points estimés">النقاط المقدرة</div>
                <div class="est-value" id="estimatedPoints">50</div>
            </div>
            
            <button class="request-btn" id="requestBtn" onclick="submitRequest()">
                🚛 <span data-ar="طلب استلام" data-fr="Demander la collecte">طلب استلام</span>
            </button>
        </div>

        <!-- لوحة المتصدرين -->
        <div class="leaderboard-card">
            <div class="lb-header">
                <div class="lb-icon">🏆</div>
                <span class="lb-title" data-ar="أفضل القائمين بالفرز" data-fr="Meilleurs trieurs">أفضل القائمين بالفرز</span>
            </div>
            <div class="lb-list" id="leaderboardList">
                <!-- تُملأ تلقائياً -->
            </div>
        </div>
    </main>

    <!-- نافذة النجاح -->
    <div class="overlay" id="successOverlay">
        <div class="modal-card">
            <div class="modal-emoji">🎉</div>
            <div class="modal-heading" data-ar="تم الطلب بنجاح!" data-fr="Demande envoyée !">تم الطلب بنجاح!</div>
            <div class="modal-desc" id="modalMessage" 
                 data-ar="سيصلك مندوب الشركة قريباً لاستلام المواد. شكراً لمساهمتك! ♻️" 
                 data-fr="Un agent viendra bientôt collecter vos matériaux. Merci ! ♻️">
                سيصلك مندوب الشركة قريباً لاستلام المواد. شكراً لمساهمتك! ♻️
            </div>
            <button class="modal-btn" onclick="closeModal()" data-ar="حسناً" data-fr="D'accord">حسناً</button>
        </div>
    </div>

    <script>
        // ============ جسيمات ============
        (function spawnParticles() {
            const colors = ['#FFA726','#FFCC02','#4CAF50','#81C784','#FF9800','#FFF176'];
            for(let i=0; i<40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const s = Math.random()*5+2;
                p.style.cssText = `
                    width:${s}px;height:${s}px;
                    background:${colors[Math.floor(Math.random()*colors.length)]};
                    left:${Math.random()*100}%;
                    animation-duration:${Math.random()*14+10}s;
                    animation-delay:${Math.random()*10}s;
                    box-shadow: 0 0 ${s*2}px currentColor;
                `;
                document.body.appendChild(p);
            }
        })();

        // ============ اللغة ============
        let lang = sessionStorage.getItem('lang') || 'ar';

        function setLang(l) {
            lang = l;
            sessionStorage.setItem('lang', l);
            document.documentElement.dir = l==='ar'?'rtl':'ltr';
            document.documentElement.lang = l;
            document.querySelectorAll(`[data-${l}]`).forEach(el => {
                const t = el.getAttribute(`data-${l}`);
                if(t!==null && t!=='') {
                    if(['INPUT','TEXTAREA'].includes(el.tagName)) el.placeholder = t;
                    else el.textContent = t;
                }
            });
        }

        // ============ إعدادات المواد ============
        const materialPrices = {
            carton: 10,
            plastique: 15,
            verre: 8
        };

        let selectedMaterial = null;
        let userPoints = parseInt(localStorage.getItem('userPoints') || '500');

        function updatePointsDisplay() {
            document.getElementById('totalPoints').textContent = userPoints.toLocaleString('en-US');
            document.getElementById('balanceDisplay').textContent = userPoints.toLocaleString('en-US');
        }

        // ============ اختيار مادة ============
        function selectMaterial(el, material) {
            document.querySelectorAll('.material-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedMaterial = material;
            updateEstimate();
            
            // تمكين زر الطلب
            document.getElementById('requestBtn').disabled = false;
        }

        // ============ تحديث التقدير ============
        function updateEstimate() {
            const weight = parseFloat(document.getElementById('weightInput').value) || 0;
            if (selectedMaterial && weight > 0) {
                const points = weight * materialPrices[selectedMaterial];
                document.getElementById('estimatedPoints').textContent = Math.round(points).toLocaleString('en-US');
            } else {
                document.getElementById('estimatedPoints').textContent = '0';
            }
        }

        // ============ إرسال الطلب ============
        function submitRequest() {
            if (!selectedMaterial) {
                alert(lang==='ar'?'الرجاء اختيار نوع المادة أولاً':'Veuillez choisir un matériau');
                return;
            }

            const weight = parseFloat(document.getElementById('weightInput').value) || 0;
            if (weight <= 0) {
                alert(lang==='ar'?'الرجاء إدخال الوزن':'Veuillez entrer le poids');
                return;
            }

            const pointsEarned = Math.round(weight * materialPrices[selectedMaterial]);

            // إنشاء الطلب
            const request = {
                material: selectedMaterial,
                weight: weight,
                points: pointsEarned,
                time: new Date().toISOString(),
                status: 'pending'
            };

            // حفظ الطلب
            const requests = JSON.parse(localStorage.getItem('sortingRequests') || '[]');
            requests.push(request);
            localStorage.setItem('sortingRequests', JSON.stringify(requests));

            // إضافة النقاط
            userPoints += pointsEarned;
            localStorage.setItem('userPoints', userPoints.toString());
            updatePointsDisplay();

            // تحديث لوحة المتصدرين
            updateLeaderboard();

            // عرض نافذة النجاح
            const modalMsg = document.getElementById('modalMessage');
            if (lang === 'ar') {
                modalMsg.textContent = `تمت إضافة ${pointsEarned} نقطة إلى رصيدك! سيصلك مندوب الشركة قريباً لاستلام ${weight} كغ من ${getMaterialName(selectedMaterial)}. شكراً لمساهمتك! ♻️`;
            } else {
                modalMsg.textContent = `${pointsEarned} points ajoutés ! Un agent viendra collecter ${weight}kg de ${getMaterialNameFr(selectedMaterial)}. Merci ! ♻️`;
            }
            document.getElementById('successOverlay').classList.add('visible');

            // إعادة تعيين
            document.getElementById('weightInput').value = '5';
            selectedMaterial = null;
            document.querySelectorAll('.material-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('requestBtn').disabled = true;
            document.getElementById('estimatedPoints').textContent = '0';
        }

        function getMaterialName(mat) {
            const names = { carton: 'الكرتون', plastique: 'البلاستيك', verre: 'الزجاج' };
            return names[mat] || mat;
        }

        function getMaterialNameFr(mat) {
            const names = { carton: 'carton', plastique: 'plastique', verre: 'verre' };
            return names[mat] || mat;
        }

        function closeModal() {
            document.getElementById('successOverlay').classList.remove('visible');
        }

        // ============ لوحة المتصدرين ============
        function updateLeaderboard() {
            const container = document.getElementById('leaderboardList');
            
            // بيانات وهمية + المستخدم الحالي
            const players = [
                { name: lang==='ar'?'أحمد ب.':'Ahmed B.', points: 12500, avatar: '🥇' },
                { name: lang==='ar'?'سارة م.':'Sara M.', points: 10200, avatar: '🥈' },
                { name: lang==='ar'?'يوسف ك.':'Youssef K.', points: 8900, avatar: '🥉' },
                { name: lang==='ar'?'أنت':'Vous', points: userPoints, avatar: '⭐', isYou: true },
                { name: lang==='ar'?'مريم ع.':'Meriem A.', points: 6700, avatar: '👤' },
            ].sort((a, b) => b.points - a.points);

            container.innerHTML = players.map((p, i) => {
                let rankClass = 'rank-normal';
                if (i === 0) rankClass = 'rank-gold';
                else if (i === 1) rankClass = 'rank-silver';
                else if (i === 2) rankClass = 'rank-bronze';

                return `
                    <div class="lb-item" style="${p.isYou ? 'background:#E8F5E9; border:2px solid #4CAF50;' : ''}">
                        <div class="lb-rank ${rankClass}">${i + 1}</div>
                        <span class="lb-avatar">${p.avatar}</span>
                        <span class="lb-name">${p.name}${p.isYou ? (lang==='ar'?' (أنت)':' (Vous)') : ''}</span>
                        <span class="lb-points">${p.points.toLocaleString('en-US')}</span>
                    </div>
                `;
            }).join('');
        }

        // ============ تأثيرات ============
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 8);
        });

        // ============ تهيئة ============
        function init() {
            updatePointsDisplay();
            updateLeaderboard();
            document.getElementById('requestBtn').disabled = true;
            document.getElementById('estimatedPoints').textContent = '0';
        }

        setLang(lang);
        init();
        window.setLang = setLang;
    </script>
</body>
</html>
