<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدينتنا نظيفة | Notre Ville Propre</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2E7D32;
            --primary-dark: #1B5E20;
            --primary-light: #4CAF50;
            --accent: #FF6F00;
            --accent-light: #FFA726;
            --danger: #E53935;
            --info: #1E88E5;
            --bg-white: #FFFFFF;
            --bg-light: #F1F8E9;
            --text-dark: #1a1a1a;
            --text-gray: #546E7A;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
            --radius: 24px;
            --radius-sm: 14px;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            background: #0a1f0a;
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
            position: relative;
        }

        /* ============ خلفية متحركة بالجسيمات ============ */
        .particles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(160deg, #0d260d 0%, #0a1f0a 30%, #061406 100%);
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) scale(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        /* دوائر زخرفية */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(46, 125, 50, 0.15);
            top: -10%; right: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px; height: 350px;
            background: rgba(255, 111, 0, 0.1);
            bottom: -15%; left: -8%;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 250px; height: 250px;
            background: rgba(30, 136, 229, 0.08);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -6s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* ============ شريط التنقل العلوي ============ */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 31, 10, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        /* شعار مصغر في الشريط */
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 800;
            color: white;
        }

        .nav-brand-icon {
            font-size: 24px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* حاوية أزرار اللغة */
        .lang-switcher {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lang-btn {
            padding: 9px 18px;
            border: none;
            border-radius: 26px;
            cursor: pointer;
            font-family: 'Cairo', 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 700;
            transition: var(--transition);
            background: transparent;
            color: rgba(255, 255, 255, 0.65);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 18px rgba(46, 125, 50, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 18px rgba(46, 125, 50, 0.5); }
            50% { box-shadow: 0 4px 30px rgba(46, 125, 50, 0.8); }
        }

        .lang-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .lang-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 1px;
        }

        /* ============ الحاوية الرئيسية ============ */
        .main-container {
            position: relative;
            z-index: 1;
            padding: 90px 16px 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: var(--radius);
            padding: 36px 24px 28px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.25);
            animation: cardAppear 1s ease 0.3s both;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ============ الشعار ============ */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 12px;
        }

        .logo-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 3px dashed rgba(46, 125, 50, 0.3);
            animation: spin 20s linear infinite;
        }

        .logo-ring-2 {
            width: 140px; height: 140px;
            border-style: dotted;
            animation-direction: reverse;
            animation-duration: 25s;
            border-color: rgba(255, 111, 0, 0.25);
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .logo-icon {
            font-size: 64px;
            animation: bounce 2s ease-in-out infinite;
            position: relative;
            z-index: 2;
            display: block;
        }

        .logo-badge {
            position: absolute;
            bottom: 0px; right: -8px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(255, 111, 0, 0.5);
            z-index: 3;
            animation: badgeGlow 2s ease-in-out infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 4px 16px rgba(255, 111, 0, 0.5); }
            50% { box-shadow: 0 4px 28px rgba(255, 111, 0, 0.9); }
        }

        /* ============ العنوان ============ */
        .title-ar {
            font-size: 30px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2px;
            letter-spacing: -0.5px;
        }

        .title-fr {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-gray);
            margin-bottom: 6px;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 26px;
            line-height: 1.7;
            opacity: 0.85;
        }

        /* ============ فاصل مزخرف ============ */
        .divider-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 26px;
        }

        .divider-dot {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .divider-dot:nth-child(2) { animation-delay: 0.3s; }
        .divider-dot:nth-child(3) { animation-delay: 0.6s; }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(2); opacity: 1; }
        }

        /* ============ الأزرار ============ */
        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 11px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            color: white;
            font-family: 'Cairo', 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: rippleEffect 0.7s ease-out;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }

        .btn-icon { font-size: 22px; position: relative; z-index: 1; }
        .btn-text { position: relative; z-index: 1; }

        .btn-report {
            background: linear-gradient(135deg, #EF5350, #C62828);
            box-shadow: 0 8px 24px rgba(198, 40, 40, 0.35);
            animation: btnSlideIn 0.6s ease 0.5s both;
        }
        .btn-report:hover {
            box-shadow: 0 14px 32px rgba(198, 40, 40, 0.5);
            transform: translateY(-3px);
        }
        .btn-report:active { transform: translateY(0) scale(0.97); }

        .btn-sort {
            background: linear-gradient(135deg, #FFA726, #E65100);
            box-shadow: 0 8px 24px rgba(230, 81, 0, 0.35);
            animation: btnSlideIn 0.6s ease 0.65s both;
        }
        .btn-sort:hover {
            box-shadow: 0 14px 32px rgba(230, 81, 0, 0.5);
            transform: translateY(-3px);
        }
        .btn-sort:active { transform: translateY(0) scale(0.97); }

        .btn-track {
            background: linear-gradient(135deg, #42A5F5, #0D47A1);
            box-shadow: 0 8px 24px rgba(13, 71, 161, 0.35);
            animation: btnSlideIn 0.6s ease 0.8s both;
        }
        .btn-track:hover {
            box-shadow: 0 14px 32px rgba(13, 71, 161, 0.5);
            transform: translateY(-3px);
        }
        .btn-track:active { transform: translateY(0) scale(0.97); }

        @keyframes btnSlideIn {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ============ الإحصائيات ============ */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 24px;
            padding-top: 22px;
            border-top: 1px solid rgba(46, 125, 50, 0.15);
            animation: fadeIn 0.8s ease 1s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .stat-item {
            text-align: center;
            padding: 8px 4px;
            border-radius: 12px;
            transition: var(--transition);
            cursor: default;
        }

        .stat-item:hover {
            background: rgba(46, 125, 50, 0.05);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 22px;
            font-weight: 900;
            color: var(--primary-dark);
            font-family: 'Poppins', 'Cairo', sans-serif;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
            direction: ltr;
            display: inline-block;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-gray);
            font-weight: 600;
            margin-top: 2px;
        }

        .stat-icon-sm {
            font-size: 16px;
            display: block;
            margin-bottom: 2px;
        }

        /* ============ الفوتر ============ */
        .footer {
            text-align: center;
            padding: 14px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            z-index: 1;
            background: linear-gradient(transparent, rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>

    <!-- ============ خلفية الجسيمات ============ -->
    <div class="particles-bg" id="particlesBg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- ============ شريط التنقل العلوي الثابت ============ -->
    <header class="top-nav">
        <div class="nav-brand">
            <span class="nav-brand-icon">🌍</span>
            <span data-ar="مدينتنا نظيفة" data-fr="Notre Ville Propre">مدينتنا نظيفة</span>
        </div>
        
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="switchLanguage('ar')" id="btn-ar">
                🇩🇿 <span>العربية</span>
            </button>
            <span class="lang-divider"></span>
            <button class="lang-btn" onclick="switchLanguage('fr')" id="btn-fr">
                🇫🇷 <span>Français</span>
            </button>
        </div>
    </header>

    <!-- ============ المحتوى الرئيسي ============ -->
    <div class="main-container">
        <div class="card" id="mainCard">
            
            <!-- الشعار -->
            <div class="logo-wrapper">
                <div class="logo-ring"></div>
                <div class="logo-ring logo-ring-2"></div>
                <span class="logo-icon">🌍</span>
                <span class="logo-badge">♻️</span>
            </div>

            <!-- العنوان -->
            <h1 class="title-ar" data-ar="مدينتنا نظيفة" data-fr="Notre Ville Propre">
                مدينتنا نظيفة
            </h1>
            <p class="title-fr" data-ar="" data-fr="Plateforme Citoyenne Intelligente">
                Plateforme Citoyenne Intelligente
            </p>
            
            <!-- فاصل مزخرف -->
            <div class="divider-ornament">
                <span class="divider-dot"></span>
                <span class="divider-dot"></span>
                <span class="divider-dot"></span>
            </div>

            <p class="subtitle" data-ar="معاً من أجل مدينة أجمل وأنظف وأكثر ذكاءً" 
               data-fr="Ensemble pour une ville plus belle, plus propre et plus intelligente">
                معاً من أجل مدينة أجمل وأنظف وأكثر ذكاءً
            </p>

            <!-- الأزرار -->
            <div class="btn-grid">
                <button class="btn btn-report" onclick="navigateTo('report')">
                    <span class="btn-icon">📸</span>
                    <span class="btn-text" data-ar="أبلغ عن نفايات" data-fr="Signaler un déchet">
                        أبلغ عن نفايات
                    </span>
                </button>

                <button class="btn btn-sort" onclick="navigateTo('sort')">
                    <span class="btn-icon">🗂️</span>
                    <span class="btn-text" data-ar="الفرز الذكي التحفيزي" data-fr="Tri intelligent & Récompenses">
                        الفرز الذكي التحفيزي
                    </span>
                </button>

                <button class="btn btn-track" onclick="navigateTo('track')">
                    <span class="btn-icon">📍</span>
                    <span class="btn-text" data-ar="تتبع الشاحنات مباشرة" data-fr="Suivi des camions en direct">
                        تتبع الشاحنات مباشرة
                    </span>
                </button>
            </div>

            <!-- الإحصائيات - الأرقام دائماً بالشكل اللاتيني 123456789 -->
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-icon-sm">📋</span>
                    <div class="stat-value" id="reportsCount">1,250</div>
                    <div class="stat-label" data-ar="بلاغ اليوم" data-fr="Signalements / jour">
                        بلاغ اليوم
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-icon-sm">♻️</span>
                    <div class="stat-value" id="recycledCount">850</div>
                    <div class="stat-label" data-ar="كغ معاد تدويره" data-fr="Kg recyclés">
                        كغ معاد تدويره
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-icon-sm">⭐</span>
                    <div class="stat-value" id="pointsCount">45K</div>
                    <div class="stat-label" data-ar="نقطة مكافأة" data-fr="Points bonus">
                        نقطة مكافأة
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- الفوتر -->
    <div class="footer" data-ar="🏆 معاً نحو مدينة ذكية ونظيفة | النسخة 1.0" 
         data-fr="🏆 Vers une ville intelligente et propre | Version 1.0">
        🏆 معاً نحو مدينة ذكية ونظيفة | النسخة 1.0
    </div>

    <script>
        // ============ إنشاء جسيمات الخلفية ============
        function createParticles() {
            const container = document.getElementById('particlesBg');
            const colors = ['#4CAF50', '#81C784', '#FFA726', '#42A5F5', '#66BB6A', '#FFCC02'];
            const particleCount = 35;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 8 + 3;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const duration = Math.random() * 12 + 8;
                const delay = Math.random() * 10;
                
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    background: ${color};
                    left: ${left}%;
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                    box-shadow: 0 0 ${size * 2}px ${color}44;
                `;
                
                container.appendChild(particle);
            }
        }
        
        createParticles();

        // ============ تأثير الموجة على الأزرار ============
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                
                this.appendChild(ripple);
                
                ripple.addEventListener('animationend', () => ripple.remove());
            });
        });

        // ============ متغير اللغة ============
        let currentLang = 'ar';

        function switchLanguage(lang) {
            currentLang = lang;
            
            document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
            document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
            
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
            
            // تحديث كل النصوص القابلة للترجمة
            document.querySelectorAll('[data-' + lang + ']').forEach(el => {
                const translated = el.getAttribute('data-' + lang);
                if (translated) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        el.placeholder = translated;
                    } else {
                        el.textContent = translated;
                    }
                }
            });
        }

        // ============ الإحصائيات بأرقام لاتينية دائماً ============
        let reportsBase = 1250;
        let recycledBase = 850;
        let pointsBase = 45000;

        function updateStatsDisplay() {
            // دائماً نستخدم الأرقام اللاتينية (1,2,3...)
            document.getElementById('reportsCount').textContent = reportsBase.toLocaleString('en-US');
            document.getElementById('recycledCount').textContent = recycledBase.toLocaleString('en-US');
            document.getElementById('pointsCount').textContent = Math.floor(pointsBase / 1000) + 'K';
        }

        // تحديث الإحصائيات كل 5 ثوانٍ
        setInterval(() => {
            reportsBase = Math.floor(Math.random() * 500) + 1200;
            recycledBase = Math.floor(Math.random() * 300) + 750;
            pointsBase = Math.floor(Math.random() * 10000) + 40000;
            updateStatsDisplay();
        }, 5000);

        // ============ التنقل ============
        function navigateTo(page) {
            const card = document.getElementById('mainCard');
            card.style.transition = 'all 0.4s ease';
            card.style.transform = 'scale(0.95)';
            card.style.opacity = '0.5';
            
            setTimeout(() => {
                const pages = {
                    'report': 'report.html',
                    'sort': 'sort.html',
                    'track': 'track.html'
                };
                if (pages[page]) {
                    window.location.href = pages[page];
                } else {
                    const msg = currentLang === 'ar' ? 
                        '🔧 قيد التطوير - قريباً' : 
                        '🔧 En développement - Bientôt disponible';
                    alert(msg);
                    card.style.transform = 'scale(1)';
                    card.style.opacity = '1';
                }
            }, 300);
        }

        // ============ حركة البطاقة ثلاثية الأبعاد ============
        document.addEventListener('mousemove', function(e) {
            const card = document.getElementById('mainCard');
            if (window.innerWidth > 768) {
                const rect = card.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const moveX = (e.clientX - centerX) / 40;
                const moveY = (e.clientY - centerY) / 40;
                
                card.style.transform = `perspective(1000px) rotateY(${-moveX}deg) rotateX(${moveY}deg)`;
                card.style.transition = 'transform 0.1s ease';
            }
        });

        document.addEventListener('mouseleave', function() {
            const card = document.getElementById('mainCard');
            card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
            card.style.transition = 'transform 0.6s ease';
        });
    </script>

</body>
</html>
